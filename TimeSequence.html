<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TimeSequence.html</title>
    <link
      rel="icon"
      href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <text y='.85em' font-size='80' fill='%2339ff14'>⏱</text>
</svg>"
    />

    <style>
      /* =========================
         styles/sections/base.css
      ========================= */

      :root {
        --bg: #000000;
        --panel: #050505;
        --panel-2: #0a0a0a;
        --text: #d8ffd8;
        --muted: #5cff87;
        --accent: #39ff14;
        --accent-2: #7fff5a;
        --danger: #ff4d4d;
        --border: rgba(57, 255, 20, 0.18);
        --shadow: 0 0 18px rgba(57, 255, 20, 0.16);
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: #000000;
        color: var(--text);
      }

      body {
        min-height: 100dvh;
      }

      button,
      input {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      /* =========================
         styles/sections/layout.css
      ========================= */

      .app-shell {
        position: relative;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
      }

      .main-view {
        width: 100%;
        height: 100dvh;
        display: grid;
        grid-template-rows: 10% 10% 70% 10%;
        padding: 0 12px;
      }

      .timer-card {
        display: contents;
      }

      .timer-controls-top,
      .timer-layout,
      .sequence-hero,
      .top-bar,
      .top-actions {
        display: contents;
      }

      @media (max-width: 900px) {
        .main-view {
          padding: 0 10px;
        }
      }

      @media (max-width: 640px) {
        .main-view {
          grid-template-rows: 10% 10% 70% 10%;
          padding: 0 8px;
        }
      }

      @media (max-height: 700px) {
        .main-view {
          grid-template-rows: 10% 10% 70% 10%;
        }
      }

      /* =========================
         styles/sections/header.css
      ========================= */

      .top-control-bar {
        display: grid;
        grid-template-columns: 50px 1fr 50px;
        align-items: center;
        gap: 12px;
        min-height: 0;
        padding-top: max(8px, env(safe-area-inset-top));
      }

      .left-controls,
      .right-controls {
        display: flex;
        align-items: center;
      }

      .left-controls {
        justify-content: flex-start;
      }

      .right-controls {
        justify-content: flex-end;
      }

      .center-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        min-width: 0;
      }

      .icon-button {
        width: 50px;
        height: 50px;
        border-radius: 0;
        border: 1px solid rgba(57, 255, 20, 0.22);
        background: #050505;
        color: var(--accent);
        cursor: pointer;
        font-size: 1.3rem;
        box-shadow: none;
        transition:
          transform 0.12s ease,
          border-color 0.12s ease,
          color 0.12s ease,
          background 0.12s ease;
      }

      .icon-button:hover {
        transform: translateY(-1px);
        border-color: rgba(57, 255, 20, 0.4);
      }

      .control-button,
      .primary-button {
        all: unset;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-sizing: border-box;
      }

      .timer-form .primary-button {
        padding: 10px 16px;
        border: 1px solid rgba(57, 255, 20, 0.22);
        background: #081308;
        color: #9dff9d;
        font-weight: 700;
        border-radius: 0;
        white-space: nowrap;
        transition:
          transform 0.12s ease,
          border-color 0.12s ease,
          color 0.12s ease,
          background 0.12s ease;
      }

      .timer-form .primary-button:hover {
        transform: translateY(-1px);
        border-color: rgba(57, 255, 20, 0.4);
      }

      .danger-button {
        color: #ff7a7a;
      }

      .boombox-controls {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        align-items: stretch;
        width: 100%;
        max-width: 600px;
        height: 60px;
        margin: 0 auto;
        padding: 0;
        border: 3px solid #1a1a1a;
        border-radius: 0 !important;
        overflow: hidden;
        background: #0b0b0b;
        box-shadow: none !important;
      }

      .boombox-button {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: none;
        border-right: 3px solid #1a1a1a;
        border-radius: 0 !important;
        background: #0b0b0b;
        color: #cccccc;
        box-shadow: none !important;
      }

      .boombox-button:last-child {
        border-right: none;
      }

      .boombox-button:hover {
        background: #121212;
        transform: none;
      }

      .boombox-button:active {
        background: #050505;
        transform: translateY(1px);
      }

      .btn-icon {
        font-size: 1.5rem;
        line-height: 1;
        font-weight: 800;
        color: inherit;
        text-shadow: none;
      }

      .btn-label {
        font-size: 0.64rem;
        letter-spacing: 0.08em;
        font-weight: 700;
        color: inherit;
        opacity: 0.95;
      }

      .boombox-button.btn-play {
        color: #39ff14;
      }

      .boombox-button.btn-pause {
        color: #4da6ff;
      }

      .boombox-button.btn-reset {
        color: #ff9f1a;
      }

      .boombox-button.btn-clear {
        color: #ff4d4d;
      }

      .boombox-button.btn-play:active .btn-icon,
      .boombox-button.btn-play:active .btn-label {
        text-shadow:
          0 0 4px rgba(57, 255, 20, 0.55),
          0 0 10px rgba(57, 255, 20, 0.28);
      }

      .boombox-button.btn-pause:active .btn-icon,
      .boombox-button.btn-pause:active .btn-label {
        text-shadow:
          0 0 4px rgba(77, 166, 255, 0.55),
          0 0 10px rgba(77, 166, 255, 0.28);
      }

      .boombox-button.btn-reset:active .btn-icon,
      .boombox-button.btn-reset:active .btn-label {
        text-shadow:
          0 0 4px rgba(255, 159, 26, 0.55),
          0 0 10px rgba(255, 159, 26, 0.28);
      }

      .boombox-button.btn-clear:active .btn-icon,
      .boombox-button.btn-clear:active .btn-label {
        text-shadow:
          0 0 4px rgba(255, 77, 77, 0.55),
          0 0 10px rgba(255, 77, 77, 0.28);
      }

      @media (max-width: 900px) {
        .top-control-bar {
          grid-template-columns: 56px 1fr 56px;
          gap: 4px;
        }

        .icon-button {
          width: 44px;
          height: 44px;
          font-size: 1.15rem;
        }

        .boombox-controls {
          width: min(420px, 100%);
          height: 64px;
        }

        .btn-icon {
          font-size: 1.3rem;
        }

        .btn-label {
          font-size: 0.58rem;
        }
      }

      @media (max-width: 640px) {
        .top-control-bar {
          grid-template-columns: 50px 1fr 50px;
          gap: 4px;
        }

        .icon-button {
          width: 40px;
          height: 40px;
          font-size: 1rem;
        }

        .boombox-controls {
          width: 100%;
          max-width: 640px;
        }

        .btn-icon {
          font-size: 1rem;
        }

        .btn-label {
          font-size: 0.5rem;
        }
      }

      .boombox-button.is-disabled,
      .icon-button.is-disabled,
      .control-button.is-disabled,
      .primary-button.is-disabled {
        opacity: 0.35;
        cursor: not-allowed;
        pointer-events: none;
      }

      .boombox-button.is-active .btn-icon,
      .boombox-button.is-active .btn-label {
        text-shadow: 0 0 8px currentColor;
      }

      /* =========================
         styles/sections/sequence.css
      ========================= */

      .sequence-strip-wrap {
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
        padding: 2px 0 0;
      }

      .sequence-header {
        font-size: 0.7rem;
        font-weight: 700;
        color: rgba(92, 255, 135, 0.7);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .hero-queue,
      .hero-queue.compact {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        padding: 2px 0 6px;
        scrollbar-width: thin;
        min-height: 0;
      }

      .hero-queue::-webkit-scrollbar {
        height: 6px;
      }

      .hero-queue::-webkit-scrollbar-thumb {
        background: rgba(57, 255, 20, 0.15);
      }

      .hero-timer-chip {
        flex: 0 0 auto;
        min-width: 110px;
        max-width: 140px;
        border-radius: 0;
        border: 1px solid rgba(57, 255, 20, 0.12);
        background: #040404;
        padding: 6px 8px;
        box-shadow: none;
        opacity: 1;
        transition:
          opacity 0.2s ease,
          background 0.2s ease;
      }

      .hero-timer-chip.active {
        border-color: rgba(57, 255, 20, 0.45);
        background: #071107;
      }

      .hero-timer-chip.completed {
        border-color: rgba(120, 120, 120, 0.2);
        background: #0a0a0a;
        opacity: 0.35;
      }

      .hero-timer-chip.placeholder {
        opacity: 0.4;
        border-color: rgba(120, 120, 120, 0.2);
        background: #0a0a0a;
      }

      .hero-timer-chip.placeholder .hero-chip-index,
      .hero-timer-chip.placeholder .hero-chip-label {
        color: #777;
      }

      .hero-timer-chip.total-chip {
        border-color: rgba(77, 166, 255, 0.3);
        background: #07111a;
      }

      .hero-timer-chip.total-chip .hero-chip-index,
      .hero-timer-chip.total-chip .hero-chip-label,
      .hero-timer-chip.total-chip .hero-chip-time {
        color: #8fc8ff;
      }

      .hero-chip-index {
        font-size: 0.55rem;
        color: rgba(92, 255, 135, 0.6);
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .hero-chip-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: #b9ffb9;
        margin-bottom: 4px;
        word-break: break-word;
      }

      .hero-chip-time {
        font-size: 0.68rem;
        color: rgba(92, 255, 135, 0.7);
      }

      .hero-timer-chip.completed .hero-chip-index,
      .hero-timer-chip.completed .hero-chip-label,
      .hero-timer-chip.completed .hero-chip-time {
        color: #7a7a7a;
      }

      @media (max-width: 900px) {
        .hero-timer-chip {
          min-width: 95px;
          max-width: 120px;
          padding: 6px 7px;
        }

        .hero-chip-label {
          font-size: 0.7rem;
        }
      }

      @media (max-width: 640px) {
        .sequence-header {
          font-size: 0.6rem;
          margin-bottom: 4px;
        }

        .hero-queue {
          gap: 6px;
        }

        .hero-timer-chip {
          min-width: 85px;
          max-width: 110px;
          padding: 5px 6px;
        }

        .hero-chip-index {
          font-size: 0.5rem;
        }

        .hero-chip-label {
          font-size: 0.65rem;
        }

        .hero-chip-time {
          font-size: 0.6rem;
        }
      }

      /* =========================
         styles/sections/timer.css
      ========================= */

      .timer-stage,
      .timer-stage-large {
        min-height: 0;
        display: grid;
        place-items: center;
        text-align: center;
        gap: 6px;
        overflow: hidden;
        padding: 0;
        position: relative;
      }

      .current-label,
      .main-timer,
      .giant-timer,
      .sub-status {
        position: relative;
        z-index: 1;
      }

      .current-label {
        font-size: clamp(0.9rem, 1.6vw, 1.2rem);
        color: rgba(92, 255, 135, 0.7);
        letter-spacing: 0.12em;
        font-weight: 700;
        text-transform: uppercase;
      }

      .main-timer,
      .giant-timer {
        font-size: 10rem;
        line-height: 0.8;
        font-weight: 900;
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
        color: #39ff14;
        text-shadow:
          0 0 6px rgba(57, 255, 20, 0.35),
          0 0 14px rgba(57, 255, 20, 0.2);
        white-space: nowrap;
        display: inline-block;
        max-width: 100%;
      }

      .colon {
        display: inline-block;
        transform: translateY(-0.3em);
        font-size: 0.6em;
      }

      .sub-status {
        color: rgba(92, 255, 135, 0.5);
        font-size: clamp(0.85rem, 1.2vw, 0.95rem);
        letter-spacing: 0.05em;
      }

      @media (max-width: 767px) and (orientation: portrait) {
        .current-label {
          font-size: clamp(0.75rem, 3vw, 1rem);
        }

        .sub-status {
          font-size: 0.75rem;
        }
      }

      /* =========================
         styles/sections/progress.css
      ========================= */

      .progress-wrap {
        min-height: 0;
        display: flex;
        align-items: center;
        padding: 0 2px 6px;
      }

      .progress-track {
        width: 100%;
        height: 16px;
        background: #050505;
        overflow: hidden;
        border: 1px solid rgba(57, 255, 20, 0.12);
        border-radius: 0;
        box-shadow: inset 0 0 6px rgba(57, 255, 20, 0.04);
      }

      .progress-bar {
        width: 100%;
        height: 100%;
        border-radius: 0;
        background: #39ff14;
        transition:
          width 0.08s linear,
          background 0.2s linear;
        box-shadow: none;
      }

      @media (max-width: 900px) {
        .progress-track {
          height: 14px;
        }
      }

      @media (max-width: 640px) {
        .progress-track {
          height: 12px;
        }

        .progress-wrap {
          padding: 0 1px 4px;
        }
      }

      /* =========================
         styles/sections/panel.css
      ========================= */

      .side-panel {
        position: absolute;
        top: 0;
        bottom: 0;
        width: min(370px, 92vw);
        padding: 18px;
        background: #030303;
        border-right: 1px solid rgba(57, 255, 20, 0.14);
        box-shadow: 0 0 24px rgba(57, 255, 20, 0.06);
        z-index: 20;
        overflow-y: auto;
        transform: translateX(0);
        opacity: 1;
        visibility: visible;
        transition:
          transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.2s ease,
          visibility 0.2s ease;
        will-change: transform, opacity;
      }

      .side-panel.hidden {
        transform: translateX(-105%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .right-panel {
        right: 0;
        left: auto;
        border-right: none;
        border-left: 1px solid rgba(57, 255, 20, 0.14);
      }

      .right-panel.hidden {
        transform: translateX(105%);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .panel-section {
        padding: 16px;
        margin-bottom: 14px;
        border-radius: 0;
        background: #050505;
        border: 1px solid rgba(57, 255, 20, 0.12);
      }

      .panel-section h3,
      .panel-header h2 {
        margin: 0 0 12px;
        color: #a8ffa8;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
      }

      .timer-queue,
      .preset-list {
        display: grid;
        gap: 10px;
      }

      .queue-item,
      .preset-item {
        border: 1px solid rgba(57, 255, 20, 0.1);
        background: #060606;
        border-radius: 0;
        padding: 12px;
      }

      .queue-item-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }

      .queue-title {
        font-weight: bold;
        color: #b9ffb9;
      }

      .queue-time {
        color: rgba(92, 255, 135, 0.75);
        font-size: 0.95rem;
      }

      .queue-actions,
      .preset-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .queue-item button,
      .preset-item button {
        border: 1px solid rgba(57, 255, 20, 0.14);
        border-radius: 0;
        padding: 8px 10px;
        cursor: pointer;
        background: #0a0a0a;
        color: #7fff7f;
      }

      .queue-item button:hover,
      .preset-item button:hover {
        background: #141414;
      }

      .preset-edit-button {
        border: 1px solid rgba(57, 255, 20, 0.14);
        background: #0a0a0a;
        color: #8fff8f;
        padding: 6px 8px;
        cursor: pointer;
        border-radius: 0;
      }

      .preset-edit-button:hover {
        background: #141414;
      }

      @media (max-width: 640px) {
        .side-panel {
          width: min(320px, 94vw);
          padding: 14px;
        }
      }

      /* =========================
         styles/sections/forms.css
      ========================= */

      .timer-form {
        display: grid;
        gap: 14px;
      }

      .timer-form label {
        display: grid;
        gap: 8px;
        color: var(--muted);
      }

      .timer-form input {
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
      }

      .time-input-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      @media (max-width: 640px) {
        .time-input-row {
          grid-template-columns: 1fr;
        }
      }

      /* =========================
         styles/time_entry/time_entry_window.css
      ========================= */

      .modal-overlay {
        position: absolute;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.82);
      }

      .modal-overlay.hidden {
        display: none;
      }

      .modal-window {
        width: min(520px, 92vw);
        border: 1px solid rgba(57, 255, 20, 0.14);
        background: #040404;
        box-shadow:
          0 0 24px rgba(0, 0, 0, 0.6),
          inset 0 0 0 1px rgba(57, 255, 20, 0.04);
        padding: 18px;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .modal-header h2 {
        margin: 0;
        color: #a8ffa8;
        font-size: 1rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .modal-form {
        display: grid;
        gap: 16px;
      }

      .timer-form input {
        padding: 10px 12px;
        border: 1px solid rgba(57, 255, 20, 0.14);
        background: #0a0a0a;
        color: #cfffcc;
        border-radius: 0;
        outline: none;
      }

      .timer-form input:focus {
        border-color: rgba(57, 255, 20, 0.4);
      }

      .time-input-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .time-input-row label {
        display: grid;
        gap: 6px;
        font-size: 0.75rem;
        color: rgba(92, 255, 135, 0.75);
      }

      .time-presets {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .time-preset-button {
        border: 1px solid rgba(57, 255, 20, 0.14);
        background: #0a0a0a;
        color: #8fff8f;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 0;
        font-size: 0.75rem;
        letter-spacing: 0.04em;
      }

      .time-preset-button:hover {
        background: #141414;
      }

      .time-preset-button:active {
        background: #060606;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .secondary-modal-button {
        padding: 10px 16px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: #111111;
        color: #d6d6d6;
        cursor: pointer;
        border-radius: 0;
      }

      .secondary-modal-button:hover {
        background: #1a1a1a;
      }

      .secondary-modal-button:active {
        background: #060606;
      }

      @media (max-width: 640px) {
        .modal-window {
          width: min(94vw, 520px);
          padding: 14px;
        }

        .time-input-row {
          grid-template-columns: 1fr;
        }

        .modal-actions {
          flex-direction: column;
        }

        .secondary-modal-button,
        .modal-actions .primary-button {
          width: 100%;
        }
      }

      /* =========================
         styles/presets/preset_editor_window.css
      ========================= */

      .preset-editor-overlay {
        position: absolute;
        inset: 0;
        z-index: 45;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.84);
      }

      .preset-editor-overlay.hidden {
        display: none;
      }

      .preset-editor-window {
        width: min(700px, 94vw);
        max-height: 88dvh;
        overflow: auto;
        border: 1px solid rgba(57, 255, 20, 0.14);
        background: #040404;
        box-shadow:
          0 0 24px rgba(0, 0, 0, 0.6),
          inset 0 0 0 1px rgba(57, 255, 20, 0.04);
        padding: 18px;
      }

      .preset-editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .preset-editor-header h2 {
        margin: 0;
        color: #a8ffa8;
        font-size: 1rem;
        letter-spacing: 0.06em;

    <script>
      // =========================
      // js/core/event_bus.js
      // =========================

      class EventBus {
        constructor() {
          this.events = new Map();
        }

        on(eventName, handler) {
          if (!this.events.has(eventName)) {
            this.events.set(eventName, new Set());
          }
          this.events.get(eventName).add(handler);
        }

        off(eventName, handler) {
          if (!this.events.has(eventName)) return;
          this.events.get(eventName).delete(handler);
        }

        emit(eventName, payload) {
          if (!this.events.has(eventName)) return;
          for (const handler of this.events.get(eventName)) {
            handler(payload);
          }
        }
      }

      // =========================
      // js/core/logger.js
      // =========================

      class Logger {
        constructor(enabled = true) {
          this.enabled = enabled;
        }

        info(message, data = null) {
          if (!this.enabled) return;
          console.log(`[TimeSequence][INFO] ${message}`, data ?? "");
        }

        warn(message, data = null) {
          if (!this.enabled) return;
          console.warn(`[TimeSequence][WARN] ${message}`, data ?? "");
        }

        error(message, data = null) {
          if (!this.enabled) return;
          console.error(`[TimeSequence][ERROR] ${message}`, data ?? "");
        }
      }

      // =========================
      // js/core/time.js
      // =========================

      function formatSecondsToClock(totalSeconds) {
        const safe = Math.max(0, Math.floor(totalSeconds));
        const hours = Math.floor(safe / 3600);
        const minutes = Math.floor((safe % 3600) / 60);
        const seconds = safe % 60;

        return [hours, minutes, seconds]
          .map((value) => String(value).padStart(2, "0"))
          .join(":");
      }

      function normalizeDuration(hours, minutes, seconds) {
        const h = Math.max(0, Number(hours) || 0);
        const m = Math.max(0, Number(minutes) || 0);
        const s = Math.max(0, Number(seconds) || 0);

        return h * 3600 + m * 60 + s;
      }

      // =========================
      // js/managers/storage_manager.js
      // =========================

      class StorageManager {
        constructor(key, logger) {
          this.key = key;
          this.logger = logger;
        }

        save(state) {
          localStorage.setItem(this.key, JSON.stringify(state));
          this.logger.info("State saved");
        }

        load() {
          try {
            const raw = localStorage.getItem(this.key);
            return raw ? JSON.parse(raw) : null;
          } catch (error) {
            this.logger.error("Failed to load state", error);
            return null;
          }
        }

        clear() {
          localStorage.removeItem(this.key);
          this.logger.info("State cleared");
        }
      }

      // =========================
      // js/managers/audio_manager.js
      // =========================

      class AudioManager {
        constructor(logger) {
          this.logger = logger;
        }

        buzz(enabled) {
          if (!enabled) return;

          try {
            const AudioContextClass =
              window.AudioContext || window.webkitAudioContext;
            const context = new AudioContextClass();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();

            oscillator.type = "square";
            oscillator.frequency.setValueAtTime(880, context.currentTime);

            gainNode.gain.setValueAtTime(0.001, context.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(
              0.15,
              context.currentTime + 0.02,
            );
            gainNode.gain.exponentialRampToValueAtTime(
              0.001,
              context.currentTime + 0.35,
            );

            oscillator.connect(gainNode);
            gainNode.connect(context.destination);

            oscillator.start();
            oscillator.stop(context.currentTime + 0.35);

            oscillator.onended = () => {
              context.close();
            };
          } catch (error) {
            this.logger.warn("Buzzer could not play", error);
          }
        }
      }

      // =========================
      // js/managers/preset_manager.js
      // =========================

      class PresetManager {
        constructor() {
          this.key = "time-sequence-presets";
          this.presets = this.loadPresets();
        }

        createId() {
          return `preset-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
        }

        loadPresets() {
          try {
            const raw = localStorage.getItem(this.key);
            const parsed = raw ? JSON.parse(raw) : [];
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            console.error("Failed to load presets:", error);
            return [];
          }
        }

        saveToStorage() {
          try {
            localStorage.setItem(this.key, JSON.stringify(this.presets));
          } catch (error) {
            console.error("Failed to save presets:", error);
          }
        }

        getPresets() {
          return this.presets;
        }

        getPresetById(id) {
          return this.presets.find((preset) => preset.id === id) || null;
        }

        addPreset(data) {
          const preset = {
            id: this.createId(),
            name: data?.name?.trim() || "",
            timers: this.normalizeTimers(data?.timers || []),
          };

          this.presets.push(preset);
          this.saveToStorage();
          return preset;
        }

        updatePreset(id, data) {
          const preset = this.getPresetById(id);
          if (!preset) return null;

          preset.name = data?.name?.trim() || "";
          preset.timers = this.normalizeTimers(data?.timers || []);
          this.saveToStorage();

          return preset;
        }

        savePreset(data) {
          if (data?.id) {
            return this.updatePreset(data.id, data);
          }

          return this.addPreset(data);
        }

        deletePreset(id) {
          const index = this.presets.findIndex((preset) => preset.id === id);
          if (index === -1) return false;

          this.presets.splice(index, 1);
          this.saveToStorage();
          return true;
        }

        normalizeTimers(timers = []) {
          return timers
            .map((timer, index) => ({
              label: timer?.label?.trim() || `Timer ${index + 1}`,
              duration: Number(timer?.duration || 0),
            }))
            .filter((timer) => timer.duration > 0);
        }
      }

      // =========================
      // js/managers/sequence_manager.js
      // =========================

      class SequenceManager {
        constructor(bus, storage, logger) {
          this.bus = bus;
          this.storage = storage;
          this.logger = logger;

          this.state = {
            timers: [],
            currentIndex: 0,
            buzzerEnabled: true,
          };
        }

        init() {
          const saved = this.storage.load();
          if (saved) {
            this.state = { ...this.state, ...saved };
            this.logger.info("Loaded saved sequence", this.state);
          }
          this.emitUpdate();
        }

        addTimer(timer) {
          this.state.timers.push({
            id: crypto.randomUUID(),
            label: timer.label || `Timer ${this.state.timers.length + 1}`,
            duration: timer.duration,
          });
          this.persist();
        }

        addTimers(timers) {
          timers.forEach((timer) => this.addTimer(timer));
        }

        removeTimer(id) {
          this.state.timers = this.state.timers.filter(
            (timer) => timer.id !== id,
          );
          this.state.currentIndex = Math.min(
            this.state.currentIndex,
            Math.max(0, this.state.timers.length - 1),
          );
          this.persist();
        }

        moveUp(id) {
          const index = this.state.timers.findIndex((timer) => timer.id === id);
          if (index <= 0) return;
          [this.state.timers[index - 1], this.state.timers[index]] = [
            this.state.timers[index],
            this.state.timers[index - 1],
          ];
          this.persist();
        }

        clearAll() {
          this.state.timers = [];
          this.state.currentIndex = 0;
          this.persist();
        }

        resetSequencePosition() {
          this.state.currentIndex = 0;
          this.persist(false);
          this.emitUpdate();
        }

        setBuzzerEnabled(enabled) {
          this.state.buzzerEnabled = Boolean(enabled);
          this.persist();
        }

        getCurrentTimer() {
          return this.state.timers[this.state.currentIndex] || null;
        }

        getAllTimers() {
          return [...this.state.timers];
        }

        getCurrentIndex() {
          return this.state.currentIndex;
        }

        getBuzzerEnabled() {
          return this.state.buzzerEnabled;
        }

        advance() {
          this.state.currentIndex += 1;
          this.persist(false);
          this.emitUpdate();
        }

        hasNext() {
          return this.state.currentIndex < this.state.timers.length - 1;
        }

        isEmpty() {
          return this.state.timers.length === 0;
        }

        toJSON() {
          return {
            timers: this.state.timers,
            currentIndex: this.state.currentIndex,
            buzzerEnabled: this.state.buzzerEnabled,
          };
        }

        persist(emit = true) {
          this.storage.save(this.toJSON());
          if (emit) this.emitUpdate();
        }

        emitUpdate() {
          this.bus.emit("sequence:updated", this.toJSON());
        }
      }

      // =========================
      // js/managers/timer_manager.js
      // =========================

      class TimerManager {
        constructor(bus, audio, logger) {
          this.bus = bus;
          this.audio = audio;
          this.logger = logger;

          this.intervalId = null;
          this.running = false;
          this.paused = false;

          this.currentDuration = 0;
          this.remaining = 0;

          this.targetEndTime = 0;
          this.lastRemainingMs = 0;
        }

        init() {
          /* no worker needed */
        }

        start(duration) {
          this.stopIntervalOnly();

          this.currentDuration = duration;
          this.remaining = duration;
          this.running = true;
          this.paused = false;

          this.targetEndTime = Date.now() + duration * 1000;
          this.lastRemainingMs = duration * 1000;

          this.emitTick();
          this.startInterval();

          this.logger.info("Timer started", { duration });
        }

        pause() {
          if (!this.running) return;

          const remainingMs = Math.max(0, this.targetEndTime - Date.now());

          this.remaining = Math.ceil(remainingMs / 1000);
          this.lastRemainingMs = remainingMs;

          this.running = false;
          this.paused = this.remaining > 0;

          this.stopIntervalOnly();

          this.logger.info("Timer paused", { remaining: this.remaining });
        }

        resume() {
          if (this.running || this.remaining <= 0) return;

          this.running = true;
          this.paused = false;

          this.targetEndTime = Date.now() + this.lastRemainingMs;
          this.startInterval();
          this.emitTick();

          this.logger.info("Timer resumed", {
            remaining: this.remaining,
            fullDuration: this.currentDuration,
          });
        }

        reset(duration) {
          this.stopIntervalOnly();

          this.running = false;
          this.paused = true;
          this.currentDuration = duration;
          this.remaining = duration;
          this.lastRemainingMs = duration * 1000;
          this.targetEndTime = 0;

          this.bus.emit("timer:tick", {
            remaining: duration,
            duration,
            progress: 100,
          });

          this.logger.info("Timer reset", { duration });
        }

        stop() {
          this.stopIntervalOnly();

          this.running = false;
          this.paused = false;
          this.currentDuration = 0;
          this.remaining = 0;
          this.lastRemainingMs = 0;
          this.targetEndTime = 0;

          this.bus.emit("timer:stopped");
        }

        startInterval() {
          this.intervalId = window.setInterval(() => {
            const remainingMs = Math.max(0, this.targetEndTime - Date.now());
            this.lastRemainingMs = remainingMs;
            this.remaining = Math.ceil(remainingMs / 1000);

            this.bus.emit("timer:tick", {
              remaining: this.remaining,
              duration: this.currentDuration,
              progress:
                this.currentDuration > 0
                  ? (remainingMs / (this.currentDuration * 1000)) * 100
                  : 0,
            });

            if (remainingMs <= 0) {
              this.stopIntervalOnly();
              this.running = false;
              this.paused = false;
              this.remaining = 0;
              this.lastRemainingMs = 0;

              this.bus.emit("timer:tick", {
                remaining: 0,
                duration: this.currentDuration,
                progress: 0,
              });

              this.bus.emit("timer:completed");
            }
          }, 50);
        }

        stopIntervalOnly() {
          if (this.intervalId !== null) {
            clearInterval(this.intervalId);
            this.intervalId = null;
          }
        }

        emitTick() {
          this.bus.emit("timer:tick", {
            remaining: this.remaining,
            duration: this.currentDuration,
            progress:
              this.currentDuration > 0
                ? (this.lastRemainingMs / (this.currentDuration * 1000)) * 100
                : 0,
          });
        }

        buzz(enabled) {
          this.audio.buzz(enabled);
        }

        isRunning() {
          return this.running;
        }

        isPaused() {
          return this.paused;
        }

        getRemaining() {
          return this.remaining;
        }
      }

      // =========================
      // js/managers/time_entry_manager.js
      // =========================

      class TimeEntryManager {
        constructor(bus, timeEntryComponent, logger) {
          this.bus = bus;
          this.timeEntryComponent = timeEntryComponent;
          this.logger = logger;
        }

        init() {
          this.timeEntryComponent.bindCloseEvents(() => {
            this.close();
          });

          this.bus.on("time-entry:open", () => {
            this.open();
          });

          this.bus.on("time-entry:close", () => {
            this.close();
          });
        }

        open() {
          this.timeEntryComponent.open();
          this.logger.info("Time entry window opened");
        }

        close() {
          this.timeEntryComponent.close();
          this.logger.info("Time entry window closed");
        }
      }

      class PresetEditorManager {
        constructor(bus, presetEditor, presets, logger) {
          this.bus = bus;
          this.presetEditor = presetEditor;
          this.presets = presets;
          this.logger = logger;
        }

        init() {
          this.presetEditor.bindCloseEvents(() => {
            this.close();
          });

          this.presetEditor.bindEditorEvents({
            onSave: (data) => this.savePreset(data),
            onDelete: (presetId) => this.deletePreset(presetId),
            onAddRow: () => {
              this.logger.info("Preset timer row added");
            },
          });

          this.bus.on("preset-editor:open-new", () => {
            this.openNew();
          });

          this.bus.on("ui:edit-preset", (presetId) => {
            this.openExisting(presetId);
          });

          this.bus.on("preset-editor:close", () => {
            this.close();
          });
        }

        openNew() {
          this.presetEditor.setPreset(null);
          this.presetEditor.setDeleteEnabled(false);
          this.presetEditor.open();
          this.logger.info("Preset editor opened for new preset");
        }

        openExisting(presetId) {
          const preset = this.presets
            .getPresets()
            .find((item) => item.id === presetId);
          if (!preset) return;

          this.presetEditor.setPreset(preset);
          this.presetEditor.setDeleteEnabled(true);
          this.presetEditor.open();
          this.logger.info("Preset editor opened", { presetId });
        }

        close() {
          this.presetEditor.close();
          this.logger.info("Preset editor closed");
        }

        savePreset(data) {
          if (!data.timers.length) {
            alert("Please add at least one timer to the preset.");
            return;
          }

          this.bus.emit("preset:save", data);
          this.close();
        }

        deletePreset(presetId) {
          const confirmed = window.confirm("Delete this preset?");
          if (!confirmed) return;

          this.bus.emit("preset:delete", presetId);
          this.close();
        }
      }

      class UIManager {
        constructor(bus, presets, logger) {
          this.bus = bus;
          this.presets = presets;
          this.logger = logger;
        }

        init() {
          this.cache();
          this.bindUI();
          this.renderPresets();
          this.fitTimerText();
        }

        cache() {
          this.elements = {
            menuButton: document.getElementById("menuButton"),
            addTimerButton: document.getElementById("addTimerButton"),
            addPresetButton: document.getElementById("addPresetButton"),
            closeMenuButton: document.getElementById("closeMenuButton"),
            sideMenu: document.getElementById("sideMenu"),

            startButton: document.getElementById("startButton"),
            pauseButton: document.getElementById("pauseButton"),
            resetButton: document.getElementById("resetButton"),
            clearAllButton: document.getElementById("clearAllButton"),

            mainTimer: document.getElementById("mainTimer"),
            currentLabel: document.getElementById("currentLabel"),
            subStatus: document.getElementById("subStatus"),
            progressBar: document.getElementById("progressBar"),

            timerForm: document.getElementById("timerForm"),
            timerLabel: document.getElementById("timerLabel"),
            timerHours: document.getElementById("timerHours"),
            timerMinutes: document.getElementById("timerMinutes"),
            timerSeconds: document.getElementById("timerSeconds"),

            buzzerToggle: document.getElementById("buzzerToggle"),
            presetList: document.getElementById("presetList"),
            heroQueue: document.getElementById("heroQueue"),

            timePresetButtons: document.querySelectorAll(".time-preset-button"),
          };
        }

        bindUI() {
          const el = this.elements;

          if (el.menuButton) {
            el.menuButton.addEventListener("click", () => {
              if (el.sideMenu) {
                el.sideMenu.classList.toggle("hidden");
              }
            });
          }

          if (el.closeMenuButton) {
            el.closeMenuButton.addEventListener("click", () => {
              if (el.sideMenu) {
                el.sideMenu.classList.add("hidden");
              }
            });
          }

          if (el.addTimerButton) {
            el.addTimerButton.addEventListener("click", () => {
              if (el.sideMenu) {
                el.sideMenu.classList.add("hidden");
              }

              this.bus.emit("time-entry:open");
            });
          }

          if (el.addPresetButton) {
            el.addPresetButton.addEventListener("click", () => {
              this.bus.emit("preset-editor:open-new");
            });
          }

          if (el.timerForm) {
            el.timerForm.addEventListener("submit", (event) => {
              event.preventDefault();

              const label = el.timerLabel.value.trim();
              const duration = normalizeDuration(
                el.timerHours.value || 0,
                el.timerMinutes.value || 0,
                el.timerSeconds.value || 0,
              );

              if (duration <= 0) {
                alert("Please enter a time greater than 0.");
                return;
              }

              this.bus.emit("ui:add-timer", { label, duration });
              this.bus.emit("time-entry:close");

              el.timerForm.reset();
              el.timerHours.value = "";
              el.timerMinutes.value = "";
              el.timerSeconds.value = "";
            });
          }

          if (el.timePresetButtons && el.timePresetButtons.length > 0) {
            el.timePresetButtons.forEach((button) => {
              button.addEventListener("click", () => {
                const totalSeconds = Number(button.dataset.presetSeconds || 0);

                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                el.timerHours.value = hours > 0 ? String(hours) : "";
                el.timerMinutes.value = minutes > 0 ? String(minutes) : "";
                el.timerSeconds.value = seconds > 0 ? String(seconds) : "";
              });
            });
          }

          if (el.startButton) {
            el.startButton.addEventListener("click", () => {
              if (el.startButton.disabled) return;
              this.bus.emit("ui:start");
            });
          }

          if (el.pauseButton) {
            el.pauseButton.addEventListener("click", () => {
              if (el.pauseButton.disabled) return;
              this.bus.emit("ui:pause");
            });
          }

          if (el.resetButton) {
            el.resetButton.addEventListener("click", () => {
              if (el.resetButton.disabled) return;
              this.bus.emit("ui:reset");
            });
          }

          if (el.clearAllButton) {
            el.clearAllButton.addEventListener("click", () => {
              if (el.clearAllButton.disabled) return;

              const confirmed = window.confirm("Clear all timers?");
              if (!confirmed) return;

              this.bus.emit("ui:clear-all");
            });
          }

          if (el.buzzerToggle) {
            el.buzzerToggle.addEventListener("change", (event) => {
              this.bus.emit("ui:buzzer-toggle", event.target.checked);
            });
          }

          window.addEventListener("resize", () => {
            this.fitTimerText();
          });
        }

        getTotalDuration(timers = []) {
          return timers.reduce((sum, timer) => sum + (timer.duration || 0), 0);
        }

        getPresetDisplayName(preset, index) {
          const name = preset?.name?.trim();
          return name || `Preset ${index + 1}`;
        }

        renderPresets() {
          if (!this.elements.presetList) return;

          const presets = this.presets.getPresets();

          this.elements.presetList.innerHTML = presets
            .map((preset, index) => {
              const totalDuration = this.getTotalDuration(preset.timers || []);
              const presetName = this.getPresetDisplayName(preset, index);

              return `
                <div class="preset-item">
                  <div class="queue-item-top">
                    <div>
                      <div class="queue-title">${this.escape(presetName)}</div>
                      <div class="queue-time">
                        ${(preset.timers || []).length} timer(s) • ${formatSecondsToClock(totalDuration)}
                      </div>
                    </div>
                    <button
                      type="button"
                      class="preset-edit-button"
                      data-edit-preset-id="${preset.id}"
                      aria-label="Edit ${this.escape(presetName)}"
                      title="Edit ${this.escape(presetName)}"
                    >
                      ✎
                    </button>
                  </div>

                  <div class="preset-actions">
                    <button data-preset-id="${preset.id}">Load</button>
                  </div>
                </div>
              `;
            })
            .join("");

          this.elements.presetList
            .querySelectorAll("button[data-preset-id]")
            .forEach((button) => {
              button.addEventListener("click", () => {
                this.bus.emit("ui:load-preset", button.dataset.presetId);
              });
            });

          this.elements.presetList
            .querySelectorAll("button[data-edit-preset-id]")
            .forEach((button) => {
              button.addEventListener("click", () => {
                this.bus.emit("ui:edit-preset", button.dataset.editPresetId);
              });
            });
        }

        renderHeroQueue(timers, currentIndex) {
          if (!this.elements.heroQueue) return;

          if (!timers.length) {
            this.elements.heroQueue.innerHTML = `
              <div class="hero-timer-chip placeholder">
                <div class="hero-chip-index">Sequence</div>
                <div class="hero-chip-label">No timers added</div>
              </div>
            `;
            return;
          }

          const totalDuration = this.getTotalDuration(timers);

          const timerChips = timers
            .map((timer, index) => {
              let stateClass = "";

              if (index < currentIndex) {
                stateClass = "completed";
              } else if (index === currentIndex) {
                stateClass = "active";
              }

              return `
                <div class="hero-timer-chip ${stateClass}">
                  <div class="hero-chip-index">Timer ${index + 1}</div>
                  <div class="hero-chip-label">${this.escape(timer.label)}</div>
                  <div class="hero-chip-time">${formatSecondsToClock(timer.duration)}</div>
                </div>
              `;
            })
            .join("");

          const totalChip = `
            <div class="hero-timer-chip total-chip">
              <div class="hero-chip-index">Total</div>
              <div class="hero-chip-label">${timers.length} timer(s)</div>
              <div class="hero-chip-time">${formatSecondsToClock(totalDuration)}</div>
            </div>
          `;

          this.elements.heroQueue.innerHTML = timerChips + totalChip;
        }

        updateMainDisplay({ label, remaining, progress, index, total }) {
          if (this.elements.currentLabel) {
            this.elements.currentLabel.textContent = label || "No Timer Loaded";
          }

          if (this.elements.mainTimer) {
            const time = formatSecondsToClock(remaining ?? 0);

            this.elements.mainTimer.innerHTML = time.replace(
              /:/g,
              "<span class='colon'>:</span>",
            );

            this.fitTimerText();
          }

          if (this.elements.subStatus) {
            this.elements.subStatus.textContent =
              total > 0
                ? `Timer ${index + 1} of ${total}`
                : "Add a timer with the + button";
          }

          if (this.elements.progressBar) {
            const safeProgress = Math.max(0, Math.min(100, progress || 0));
            this.elements.progressBar.style.width = `${safeProgress}%`;

            let progressColor = "#39ff14";

            if (safeProgress <= 10) {
              progressColor = "#ff4d4d";
            } else if (safeProgress <= 30) {
              progressColor = "#ffd60a";
            } else if (safeProgress <= 50) {
              progressColor = "#4da6ff";
            }

            this.elements.progressBar.style.background = progressColor;
          }
        }

        updateBuzzer(enabled) {
          if (this.elements.buzzerToggle) {
            this.elements.buzzerToggle.checked = enabled;
          }
        }

        updateControlState({ hasTimers, isRunning, isPaused }) {
          const { startButton, pauseButton, resetButton, clearAllButton } =
            this.elements;

          if (startButton) {
            startButton.disabled = !hasTimers || isRunning;
            startButton.setAttribute(
              "aria-disabled",
              String(startButton.disabled),
            );
            startButton.classList.toggle("is-disabled", startButton.disabled);
            startButton.classList.toggle("is-active", isRunning);
          }

          if (pauseButton) {
            pauseButton.disabled = !hasTimers || !isRunning;
            pauseButton.setAttribute(
              "aria-disabled",
              String(pauseButton.disabled),
            );
            pauseButton.classList.toggle("is-disabled", pauseButton.disabled);
            pauseButton.classList.toggle("is-active", isPaused);
          }

          if (resetButton) {
            resetButton.disabled = !hasTimers || (!isRunning && !isPaused);
            resetButton.setAttribute(
              "aria-disabled",
              String(resetButton.disabled),
            );
            resetButton.classList.toggle("is-disabled", resetButton.disabled);
          }

          if (clearAllButton) {
            clearAllButton.disabled = !hasTimers;
            clearAllButton.setAttribute(
              "aria-disabled",
              String(clearAllButton.disabled),
            );
            clearAllButton.classList.toggle(
              "is-disabled",
              clearAllButton.disabled,
            );
          }
        }

        setIdleDisplay() {
          this.updateMainDisplay({
            label: "No Timer Loaded",
            remaining: 0,
            progress: 0,
            index: 0,
            total: 0,
          });

          if (this.elements.heroQueue) {
            this.renderHeroQueue([], 0);
          }
        }

        fitTimerText() {
          const timerEl = this.elements.mainTimer;
          const stageEl =
            timerEl?.closest(".timer-stage-large") ||
            timerEl?.closest(".timer-stage");

          if (!timerEl || !stageEl) return;

          const stageWidth = stageEl.clientWidth;
          const stageHeight = stageEl.clientHeight;

          if (!stageWidth || !stageHeight) return;

          const maxWidth = stageWidth * 0.98;
          const maxHeight = stageHeight * 0.72;

          let low = 20;
          let high = 600;
          let best = 20;

          while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            timerEl.style.fontSize = `${mid}px`;

            const fitsWidth = timerEl.scrollWidth <= maxWidth;
            const fitsHeight = timerEl.scrollHeight <= maxHeight;

            if (fitsWidth && fitsHeight) {
              best = mid;
              low = mid + 1;
            } else {
              high = mid - 1;
            }
          }

          timerEl.style.fontSize = `${best}px`;
        }

        escape(value) {
          const div = document.createElement("div");
          div.textContent = value;
          return div.innerHTML;
        }
      }

      class PresetEditor {
        constructor() {
          this.elements = {
            modal: document.getElementById("presetEditorModal"),
            title: document.getElementById("presetEditorTitle"),
            closeButton: document.getElementById("closePresetEditorButton"),
            cancelButton: document.getElementById("cancelPresetEditorButton"),
            deleteButton: document.getElementById("deletePresetButton"),
            saveButton: document.getElementById("savePresetButton"),

            form: document.getElementById("presetEditorForm"),
            nameInput: document.getElementById("presetNameInput"),
            timersList: document.getElementById("presetTimersList"),
            addTimerRowButton: document.getElementById(
              "addPresetTimerRowButton",
            ),
          };

          this.currentPresetId = null;
        }

        open() {
          if (!this.elements.modal) return;

          this.elements.modal.classList.remove("hidden");
          this.elements.modal.setAttribute("aria-hidden", "false");

          if (this.elements.nameInput) {
            requestAnimationFrame(() => {
              this.elements.nameInput.focus();
            });
          }
        }

        close() {
          if (!this.elements.modal) return;

          const safeFocusTarget = document.getElementById("addPresetButton");
          if (safeFocusTarget) {
            safeFocusTarget.focus();
          } else {
            document.body.focus();
          }

          this.elements.modal.classList.add("hidden");
          this.elements.modal.setAttribute("aria-hidden", "true");
        }

        isOpen() {
          if (!this.elements.modal) return false;
          return !this.elements.modal.classList.contains("hidden");
        }

        bindCloseEvents(onClose) {
          const { modal, closeButton, cancelButton } = this.elements;

          if (closeButton) {
            closeButton.addEventListener("click", onClose);
          }

          if (cancelButton) {
            cancelButton.addEventListener("click", onClose);
          }

          if (modal) {
            modal.addEventListener("click", (event) => {
              if (event.target === modal) {
                onClose();
              }
            });
          }

          document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && this.isOpen()) {
              onClose();
            }
          });
        }

        setPreset(preset = null) {
          this.currentPresetId = preset?.id || null;

          if (this.elements.title) {
            this.elements.title.textContent = preset
              ? "Edit Preset"
              : "New Preset";
          }

          if (this.elements.nameInput) {
            this.elements.nameInput.value = preset?.name || "";
          }

          this.renderTimerRows(preset?.timers || []);
        }

        renderTimerRows(timers = []) {
          if (!this.elements.timersList) return;

          if (!timers.length) {
            this.elements.timersList.innerHTML = "";
            this.addTimerRow();
            return;
          }

          this.elements.timersList.innerHTML = timers
            .map((timer, index) => this.getTimerRowMarkup(timer, index))
            .join("");

          this.bindRowActions();
        }

        addTimerRow(timer = { label: "", duration: 0 }) {
          if (!this.elements.timersList) return;

          const index =
            this.elements.timersList.querySelectorAll(
              ".preset-timer-row",
            ).length;
          this.elements.timersList.insertAdjacentHTML(
            "beforeend",
            this.getTimerRowMarkup(timer, index),
          );
          this.bindRowActions();
        }

        getTimerRowMarkup(timer, index) {
          const duration = Number(timer.duration || 0);
          const hours = Math.floor(duration / 3600);
          const minutes = Math.floor((duration % 3600) / 60);
          const seconds = duration % 60;

          return `
            <div class="preset-timer-row" data-row-index="${index}">
              <div class="preset-timer-row-top">
                <label class="preset-row-label preset-row-label-wide">
                  Title
                  <input
                    type="text"
                    class="preset-timer-title"
                    value="${this.escape(timer.label || "")}"
                    maxlength="40"
                  />
                </label>

                <button
                  type="button"
                  class="preset-row-remove-button"
                  aria-label="Remove timer row"
                  title="Remove timer row"
                >
                  ✕
                </button>
              </div>

              <div class="preset-row-time-grid">
                <label class="preset-row-label">
                  H
                  <input type="number" class="preset-timer-hours" min="0" max="23" value="${hours || ""}" />
                </label>

                <label class="preset-row-label">
                  M
                  <input type="number" class="preset-timer-minutes" min="0" max="59" value="${minutes || ""}" />
                </label>

                <label class="preset-row-label">
                  S
                  <input type="number" class="preset-timer-seconds" min="0" max="59" value="${seconds || ""}" />
                </label>
              </div>
            </div>
          `;
        }

        bindRowActions() {
          if (!this.elements.timersList) return;

          this.elements.timersList
            .querySelectorAll(".preset-row-remove-button")
            .forEach((button) => {
              button.onclick = () => {
                const row = button.closest(".preset-timer-row");
                if (!row) return;

                row.remove();

                const rows =
                  this.elements.timersList.querySelectorAll(
                    ".preset-timer-row",
                  );
                if (!rows.length) {
                  this.addTimerRow();
                }
              };
            });
        }

        bindEditorEvents({ onSave, onDelete, onAddRow }) {
          const { form, deleteButton, addTimerRowButton } = this.elements;

          if (form) {
            form.addEventListener("submit", (event) => {
              event.preventDefault();
              onSave(this.getFormData());
            });
          }

          if (deleteButton) {
            deleteButton.addEventListener("click", () => {
              if (!this.currentPresetId) return;
              onDelete(this.currentPresetId);
            });
          }

          if (addTimerRowButton) {
            addTimerRowButton.addEventListener("click", () => {
              this.addTimerRow();
              if (onAddRow) onAddRow();
            });
          }
        }

        getFormData() {
          const name = this.elements.nameInput?.value.trim() || "";

          const rows = Array.from(
            this.elements.timersList?.querySelectorAll(".preset-timer-row") ||
              [],
          );

          const timers = rows
            .map((row) => {
              const label =
                row.querySelector(".preset-timer-title")?.value.trim() || "";
              const hours = Number(
                row.querySelector(".preset-timer-hours")?.value || 0,
              );
              const minutes = Number(
                row.querySelector(".preset-timer-minutes")?.value || 0,
              );
              const seconds = Number(
                row.querySelector(".preset-timer-seconds")?.value || 0,
              );
              const duration = hours * 3600 + minutes * 60 + seconds;

              return { label, duration };
            })
            .filter((timer) => timer.duration > 0);

          return {
            id: this.currentPresetId,
            name,
            timers,
          };
        }

        setDeleteEnabled(enabled) {
          if (!this.elements.deleteButton) return;
          this.elements.deleteButton.disabled = !enabled;
        }

        escape(value) {
          const div = document.createElement("div");
          div.textContent = value;
          return div.innerHTML;
        }
      }

      // =========================

      class AppManager {
        constructor({
          bus,
          logger,
          storage,
          audio,
          presets,
          sequence,
          timer,
          ui,
        }) {
          this.bus = bus;
          this.logger = logger;
          this.storage = storage;
          this.audio = audio;
          this.presets = presets;
          this.sequence = sequence;
          this.timer = timer;
          this.ui = ui;
        }

        init() {
          this.ui.init();
          this.sequence.init();
          this.timer.init();
          this.bindEvents();
          this.refreshUI();
        }

        bindEvents() {
          this.bus.on("ui:add-timer", ({ label, duration }) => {
            this.sequence.addTimer({ label, duration });
            this.refreshUI();
          });

          this.bus.on("ui:start", () => {
            const current = this.sequence.getCurrentTimer();
            if (!current) return;

            if (this.timer.isPaused()) {
              this.timer.resume();
            } else if (!this.timer.isRunning()) {
              this.timer.start(current.duration);
            }

            this.refreshUI();
          });

          this.bus.on("ui:pause", () => {
            this.timer.pause();
            this.refreshUI();
          });

          this.bus.on("ui:reset", () => {
            const current = this.sequence.getCurrentTimer();
            if (!current) return;

            this.timer.reset(current.duration);
            this.refreshUI();
          });

          this.bus.on("ui:clear-all", () => {
            this.timer.stop();
            this.sequence.clearAll();
            this.ui.setIdleDisplay();
            this.refreshUI();
          });

          this.bus.on("ui:buzzer-toggle", (enabled) => {
            this.sequence.setBuzzerEnabled(enabled);
            this.refreshUI();
          });

          this.bus.on("ui:load-preset", (presetId) => {
            const preset = this.presets.getPresetById(presetId);
            if (!preset) return;

            this.timer.stop();
            this.sequence.clearAll();
            this.sequence.addTimers(preset.timers);
            this.sequence.resetSequencePosition();
            this.refreshUI();
          });

          this.bus.on("preset:save", (presetData) => {
            this.presets.savePreset(presetData);
            this.ui.renderPresets();
            this.refreshUI();
          });

          this.bus.on("preset:delete", (presetId) => {
            this.presets.deletePreset(presetId);
            this.ui.renderPresets();
            this.refreshUI();
          });

          this.bus.on("ui:queue-action", ({ action, id }) => {
            if (action === "remove") this.sequence.removeTimer(id);
            if (action === "up") this.sequence.moveUp(id);
            this.refreshUI();
          });

          this.bus.on("sequence:updated", () => {
            this.refreshUI();
          });

          this.bus.on("timer:tick", ({ remaining, duration, progress }) => {
            const current = this.sequence.getCurrentTimer();

            this.ui.updateMainDisplay({
              label: current?.label || "No Timer Loaded",
              remaining,
              progress,
              index: this.sequence.getCurrentIndex(),
              total: this.sequence.getAllTimers().length,
            });

            this.refreshUIControlsOnly();
          });

          this.bus.on("timer:completed", () => {
            this.timer.buzz(this.sequence.getBuzzerEnabled());

            if (this.sequence.hasNext()) {
              this.sequence.advance();
              const next = this.sequence.getCurrentTimer();
              this.timer.start(next.duration);
              this.refreshUI();
              return;
            }

            this.timer.stop();
            this.sequence.resetSequencePosition();
            this.ui.setIdleDisplay();
            this.refreshUI();
          });

          this.bus.on("timer:stopped", () => {
            this.ui.setIdleDisplay();
            this.refreshUI();
          });
        }

        refreshUIControlsOnly() {
          const hasTimers = !this.sequence.isEmpty();

          this.ui.updateControlState({
            hasTimers,
            isRunning: this.timer.isRunning(),
            isPaused: this.timer.isPaused(),
          });
        }

        refreshUI() {
          const timers = this.sequence.getAllTimers();
          const currentIndex = this.sequence.getCurrentIndex();
          const current = this.sequence.getCurrentTimer();

          this.ui.renderPresets();
          this.ui.renderHeroQueue(timers, currentIndex);
          this.ui.updateBuzzer(this.sequence.getBuzzerEnabled());

          const hasTimers = timers.length > 0;
          this.ui.updateControlState({
            hasTimers,
            isRunning: this.timer.isRunning(),
            isPaused: this.timer.isPaused(),
          });

          if (!current) {
            this.ui.setIdleDisplay();
            return;
          }

          const remaining =
            this.timer.getRemaining() > 0
              ? this.timer.getRemaining()
              : current.duration;

          const duration = current.duration;
          const progress = duration > 0 ? (remaining / duration) * 100 : 0;

          this.ui.updateMainDisplay({
            label: current.label,
            remaining,
            progress,
            index: currentIndex,
            total: timers.length,
          });
        }
      }

      // =========================
      // js/app.js
      // =========================

      const bus = new EventBus();
      const logger = new Logger(true);
      const storage = new StorageManager("time-sequence-state", logger);
      const audio = new AudioManager(logger);
      const presets = new PresetManager();
      const sequence = new SequenceManager(bus, storage, logger);
      const timer = new TimerManager(bus, audio, logger);
      const ui = new UIManager(bus, presets, logger);

      const timeEntry = new TimeEntry();
      const timeEntryManager = new TimeEntryManager(bus, timeEntry, logger);

      const presetEditor = new PresetEditor();
      const presetEditorManager = new PresetEditorManager(
        bus,
        presetEditor,
        presets,
        logger,
      );

      const app = new AppManager({
        bus,
        logger,
        storage,
        audio,
        presets,
        sequence,
        timer,
        ui,
      });

      timeEntryManager.init();
      presetEditorManager.init();
      app.init();
    </script>
  </body>
</html>
