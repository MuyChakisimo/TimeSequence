<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>TimeSequence</title>

    <link rel="stylesheet" href="./styles/main.css" />

    <link
      rel="icon"
      href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <text y='.85em' font-size='80' fill='%2339ff14'>⏱</text>
</svg>"
    />

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="TimeSequence" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  </head>

  <body>
    <div class="app-shell">
      <div
        id="menuBackdrop"
        class="menu-backdrop hidden"
        aria-hidden="true"
      ></div>
      <!-- LEFT MENU -->
      <aside id="sideMenu" class="side-panel hidden">
        <div class="panel-header">
          <h2>Menu</h2>
          <button
            id="closeMenuButton"
            class="icon-button"
            aria-label="Close menu"
            type="button"
          >
            ✕
          </button>
        </div>

        <section class="panel-section">
          <h3>Options</h3>
          <div class="checkbox-row">
            <label>
              <input type="checkbox" id="buzzerToggle" checked />
              Enable buzzer
            </label>
          </div>
        </section>

        <section class="panel-section">
          <div class="queue-item-top">
            <h3>Presets</h3>
            <button
              id="addPresetButton"
              class="preset-edit-button"
              type="button"
              aria-label="Add preset"
              title="Add preset"
            >
              +
            </button>
          </div>

          <div id="presetList" class="preset-list"></div>
        </section>
      </aside>

      <!-- TIME ENTRY WINDOW -->
      <div id="timeEntryModal" class="modal-overlay hidden" aria-hidden="true">
        <div
          class="modal-window"
          role="dialog"
          aria-modal="true"
          aria-labelledby="timeEntryModalTitle"
        >
          <div class="modal-header">
            <h2 id="timeEntryModalTitle">Add Timer</h2>
            <button
              id="closeTimeEntryButton"
              class="icon-button"
              aria-label="Close time entry window"
              type="button"
            >
              ✕
            </button>
          </div>

          <form id="timerForm" class="timer-form modal-form">
            <label class="input-with-clear">
              Label
              <div class="input-wrap">
                <input
                  id="timerLabel"
                  type="text"
                  maxlength="40"
                  autocomplete="off"
                />

                <button
                  type="button"
                  id="clearLabelButton"
                  class="input-clear-button"
                  aria-label="Clear label"
                >
                  ✕
                </button>
              </div>
            </label>

            <div class="time-input-row">
              <label>
                Hours
                <input
                  id="timerHours"
                  type="number"
                  min="0"
                  max="23"
                  inputmode="numeric"
                />
              </label>

              <label>
                Minutes
                <input
                  id="timerMinutes"
                  type="number"
                  min="0"
                  max="59"
                  inputmode="numeric"
                />
              </label>

              <label>
                Seconds
                <input
                  id="timerSeconds"
                  type="number"
                  min="0"
                  max="59"
                  inputmode="numeric"
                />
              </label>
            </div>

            <div class="time-presets">
              <button
                type="button"
                class="time-preset-button"
                data-preset-seconds="15"
              >
                15s
              </button>
              <button
                type="button"
                class="time-preset-button"
                data-preset-seconds="30"
              >
                30s
              </button>
              <button
                type="button"
                class="time-preset-button"
                data-preset-seconds="60"
              >
                1 min
              </button>
              <button
                type="button"
                class="time-preset-button"
                data-preset-seconds="300"
              >
                5 min
              </button>
              <button
                type="button"
                class="time-preset-button"
                data-preset-seconds="1800"
              >
                30 min
              </button>
              <button
                type="button"
                class="time-preset-button"
                data-preset-seconds="3600"
              >
                1 hr
              </button>
            </div>

            <div class="modal-actions">
              <button
                id="cancelTimeEntryButton"
                class="secondary-modal-button"
                type="button"
              >
                Cancel
              </button>

              <button type="submit" class="primary-button">
                Add to Sequence
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- PRESET EDITOR WINDOW -->
      <div
        id="presetEditorModal"
        class="preset-editor-overlay hidden"
        aria-hidden="true"
      >
        <div
          class="preset-editor-window"
          role="dialog"
          aria-modal="true"
          aria-labelledby="presetEditorTitle"
        >
          <div class="preset-editor-header">
            <h2 id="presetEditorTitle">New Preset</h2>
            <button
              id="closePresetEditorButton"
              class="icon-button"
              aria-label="Close preset editor"
              type="button"
            >
              ✕
            </button>
          </div>

          <form id="presetEditorForm" class="preset-editor-form">
            <label class="preset-row-label preset-row-label-wide">
              Preset Name
              <input
                id="presetNameInput"
                type="text"
                maxlength="50"
                autocomplete="off"
              />
            </label>

            <div>
              <div class="preset-editor-section-title">Timers</div>
              <div id="presetTimersList" class="preset-timers-list"></div>
            </div>

            <button
              id="addPresetTimerRowButton"
              class="preset-row-add-button"
              type="button"
            >
              + Add Timer
            </button>

            <div class="preset-editor-actions">
              <button
                id="deletePresetButton"
                class="preset-editor-danger-button"
                type="button"
              >
                Delete Preset
              </button>

              <div class="preset-editor-actions-right">
                <button
                  id="cancelPresetEditorButton"
                  class="preset-editor-secondary-button"
                  type="button"
                >
                  Cancel
                </button>

                <button
                  id="savePresetButton"
                  class="preset-editor-primary-button"
                  type="submit"
                >
                  Done
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- MAIN UI -->
      <main class="main-view">
        <!-- HEADER -->
        <section class="top-control-bar">
          <div class="left-controls">
            <button
              id="menuButton"
              class="icon-button"
              aria-label="Open menu"
              type="button"
            >
              ☰
            </button>
          </div>

          <!-- BOOMBOX CONTROLS -->
          <div class="center-controls boombox-controls">
            <button
              id="startButton"
              class="control-button boombox-button btn-play"
              type="button"
              aria-label="Start"
            >
              <span class="btn-icon">▶</span>
              <span class="btn-label">PLAY</span>
            </button>

            <button
              id="pauseButton"
              class="control-button boombox-button btn-pause"
              type="button"
              aria-label="Pause"
            >
              <span class="btn-icon">❚❚</span>
              <span class="btn-label">PAUSE</span>
            </button>

            <button
              id="resetButton"
              class="control-button boombox-button btn-reset"
              type="button"
              aria-label="Reset"
            >
              <span class="btn-icon">↺</span>
              <span class="btn-label">RESET</span>
            </button>

            <button
              id="clearAllButton"
              class="control-button boombox-button btn-clear"
              type="button"
              aria-label="Clear all"
            >
              <span class="btn-icon">🗑</span>
              <span class="btn-label">CLEAR</span>
            </button>
          </div>

          <div class="right-controls">
            <button
              id="addTimerButton"
              class="icon-button add-timer-button"
              aria-label="Add timer"
              type="button"
            >
              +⏱
            </button>
          </div>
        </section>

        <!-- SEQUENCE -->
        <section class="sequence-strip-wrap">
          <div class="sequence-header">Sequence</div>
          <div id="heroQueue" class="hero-queue compact"></div>
        </section>

        <!-- TIMER -->
        <section class="timer-stage timer-stage-large">
          <div id="currentLabel" class="current-label">No Timer Loaded</div>

          <div id="mainTimer" class="main-timer giant-timer">00:00:00</div>

          <div id="subStatus" class="sub-status">
            Add a timer with the + button
          </div>
        </section>

        <!-- PROGRESS -->
        <section class="progress-wrap">
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./js/app.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js")
            .then(() => {
              console.log("Service Worker registered");
            })
            .catch((error) => {
              console.error("Service Worker registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>
